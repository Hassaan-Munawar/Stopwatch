    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
          display: flex;
          justify-content: center;
          gap: 50px;
          padding-top: 100px;
        }
        .font{
            color: rgb(0, 47, 255);
        }
        span {
          font-size: 50px;
        }
        #styling{
            border: 1px solid white;
            border-radius: 10px;
            width: 500px;
            height: 300px;
            background-color:white;
        }
        #pad{
           margin-top: 170px;
        }
        body{
            background-color:rgb(0, 68, 255);
        }
        @media (min-width:992px) {
            button{
           margin: 30px 30px;
           width: 80px;
        }
        }
     
        @media (max-width:992px) {
            #styling{
                width: 250px;
            }
            .main{
                gap: 20px;
            }
            #pad{
                margin-top: 120px;
            }
        }
      </style>
</head>
<body>
    <center id="pad">
        <div id="styling">
    <div class="main">
      <h2 class="font" id="min">00</h2>
      <h2 class="font">:</h2>
      <h2 class="font" id="sec">00</h2>
      <h2 class="font">:</h2>
      <h2 class="font" id="msec">00</h2>
    </div>
<br>
    <button class="btn btn-primary" onclick="stop()">Pause</button>
    <button class="btn btn-danger" id="sss" onclick="start()">Start</button>
    <button class="btn btn-success" onclick="reset()">Reset</button>

</div>
  </center>

    <script src="app.js"></script>
</body>
</html>

    <script src="app.js"></script>
</body>
</html>
